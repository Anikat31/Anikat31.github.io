<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap');
  .site-nav{
    --n-ink:#1a2332; --n-muted:#6b7d92; --n-navy:#1e3a6b; --n-navy-l:#2d5a8a;
    --n-paper:#f7f9fc; --n-rule:#e2e8f0;
    position:sticky;top:0;z-index:50;
    background:rgba(247,249,252,.86);
    backdrop-filter:saturate(140%) blur(10px);
    -webkit-backdrop-filter:saturate(140%) blur(10px);
    border-bottom:1px solid var(--n-rule);
  }
  .site-nav__inner{
    max-width:1200px;margin:0 auto;
    padding:14px 56px;
    display:flex;align-items:center;justify-content:space-between;gap:24px;
  }
  .site-nav__mark{
    display:flex;align-items:baseline;gap:10px;text-decoration:none;
    font-family:"Cormorant Garamond",Georgia,serif;
    color:var(--n-ink);
  }
  .site-nav__mark .glyph{
    font-style:italic;font-size:1.25rem;color:var(--n-navy);line-height:1;
  }
  .site-nav__mark .word{
    font-size:1.18rem;font-weight:600;letter-spacing:.01em;
  }
  .site-nav__mark .word small{
    display:block;font-family:"DM Sans",sans-serif;
    font-size:.5rem;font-weight:500;letter-spacing:.18em;
    text-transform:uppercase;color:var(--n-muted);margin-top:1px;
  }
  .site-nav__links{display:flex;align-items:center;gap:6px}
  .site-nav__links a{
    font-family:"DM Sans",sans-serif;
    font-size:.74rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
    color:var(--n-muted);text-decoration:none;
    padding:8px 14px;border-radius:2px;
    transition:color .2s,background .2s;position:relative;
  }
  .site-nav__links a:hover{color:var(--n-navy-l);background:#ebf0f7}
  .site-nav__links a.is-active{color:var(--n-navy)}
  .site-nav__links a.is-active::after{
    content:'';position:absolute;left:14px;right:14px;bottom:2px;
    height:1.5px;background:var(--n-navy);
  }
  @media (max-width:760px){
    .site-nav__inner{padding:12px 20px;flex-wrap:wrap;gap:10px}
    .site-nav__links a{padding:6px 10px;font-size:.68rem;letter-spacing:.07em}
  }
</style>
<nav class="site-nav">
  <div class="site-nav__inner">
    <a class="site-nav__mark" href="{{ '/' | relative_url }}">
      <span class="glyph">§</span>
      <span class="word">Anikat Kankaria<small>ICTS&ndash;TIFR · Bengaluru</small></span>
    </a>
    <div class="site-nav__links">
      <a href="{{ '/' | relative_url }}"{% if page.nav == 'home' %} class="is-active"{% endif %}>Home</a>
      <a href="{{ '/research/' | relative_url }}"{% if page.nav == 'research' %} class="is-active"{% endif %}>Research</a>
      <a href="{{ '/gallery/' | relative_url }}"{% if page.nav == 'gallery' %} class="is-active"{% endif %}>Gallery</a>
    </div>
  </div>
</nav>
